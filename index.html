
<!DOCTYPE html>

<html class="theme-dark" lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Brad | SlothOn</title>
    <link rel="icon" type="image/x-icon" href="/images/avatar.png">

    <meta name="description" content="Aim trainer, content creator, and KovaaK's enthusiast. 40/360cm.">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <style>
      /* Custom subtitle styling */
      .subtitle {
        font-size: 0.85em;
        opacity: 0.6;
        margin-top: -8px;
        margin-bottom: 16px;
        letter-spacing: 0.5px;
      }
      /* Custom EVXL button - teal accent */
      .button-evxl {
        background-color: #14b8a6;
        color: #fff;
      }
      .button-evxl:hover {
        background-color: #0d9488;
      }
    </style>

  <body>

    <div class="container">
      <div class="column">

        <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="Brad">

        <h1>
          <div>Brad</div>
        </h1>

        <p><em>To aim fast you must master aiming slow.</em></p>
        <p class="subtitle">40/360cm · 1600 DPI · 2560x1440 · 103 FOV</p>

        <!-- Links -->
        <div class="button-stack" role="navigation">

          <!-- EVXL -->
          <a class="button button-evxl" href="https://evxl.app/u/SlothOn" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-website.svg" alt="EVXL">EVXL Profile</a>

          <a class="button button-yt" href="https://www.youtube.com/@SlothonAim" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/youtube.svg" alt="YouTube Logo">SlothonAim</a>

          <a class="button button-x" href="https://x.com/SlothonV" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/x.svg" alt="X Logo">SlothonV</a>

          <!-- Discord -->
          <a class="button button-discord" href="https://discord.com/users/134038181698994176" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/discord.svg" alt="Discord Logo">Discord</a>

          <!-- Instagram -->
          <a class="button button-instagram" href="https://instagram.com/yourrightshoe" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo">yourrightshoe</a>

          <!-- Steam -->
          <a class="button button-steam" href="#" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/steam.svg" alt="Steam Logo">Steam</a>

        </div>

        <footer>
          Build your own by forking <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>
