    <script>
      // ========== FLOATING PARTICLES BACKGROUND ==========
      (function() {
        var canvas = document.getElementById('particles-canvas');
        var ctx = canvas.getContext('2d');
        var particles = [];
        var particleCount = 60;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        for (var i = 0; i < particleCount; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2.5 + 0.5,
            dx: (Math.random() - 0.5) * 0.4,
            dy: (Math.random() - 0.5) * 0.4,
            alpha: Math.random() * 0.4 + 0.1
          });
        }

        function drawParticles() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.x += p.dx;
            p.y += p.dy;

            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(20, 184, 166, ' + p.alpha + ')';
            ctx.fill();
          }

          // Draw faint lines between nearby particles
          for (var i = 0; i < particles.length; i++) {
            for (var j = i + 1; j < particles.length; j++) {
              var dx = particles[i].x - particles[j].x;
              var dy = particles[i].y - particles[j].y;
              var dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 120) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = 'rgba(20, 184, 166, ' + (0.06 * (1 - dist / 120)) + ')';
                ctx.lineWidth = 0.5;
                ctx.stroke();
              }
            }
          }

          requestAnimationFrame(drawParticles);
        }
        drawParticles();
      })();

      // ========== CROSSHAIR CURSOR TRAIL ==========
      (function() {
        var canvas = document.getElementById('cursor-canvas');
        var ctx = canvas.getContext('2d');
        var trail = [];
        var maxTrail = 20;
        var mouseX = 0, mouseY = 0;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', function(e) {
          mouseX = e.clientX;
          mouseY = e.clientY;
          trail.push({ x: mouseX, y: mouseY, life: 1.0 });
          if (trail.length > maxTrail) trail.shift();
        });

        function drawCrosshair(x, y, size, alpha) {
          ctx.strokeStyle = 'rgba(20, 184, 166, ' + alpha + ')';
          ctx.lineWidth = 1.5;
          ctx.lineCap = 'round';

          var gap = size * 0.35;
          var len = size;

          // Top
          ctx.beginPath();
          ctx.moveTo(x, y - len);
          ctx.lineTo(x, y - gap);
          ctx.stroke();
          // Bottom
          ctx.beginPath();
          ctx.moveTo(x, y + gap);
          ctx.lineTo(x, y + len);
          ctx.stroke();
          // Left
          ctx.beginPath();
          ctx.moveTo(x - len, y);
          ctx.lineTo(x - gap, y);
          ctx.stroke();
          // Right
          ctx.beginPath();
          ctx.moveTo(x + gap, y);
          ctx.lineTo(x + len, y);
          ctx.stroke();

          // Center dot
          ctx.beginPath();
          ctx.arc(x, y, 1.5, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(20, 184, 166, ' + alpha + ')';
          ctx.fill();
        }

        function drawTrail() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (var i = 0; i < trail.length; i++) {
            trail[i].life -= 0.05;
          }

          trail = trail.filter(function(t) { return t.life > 0; });

          for (var i = 0; i < trail.length; i++) {
            var t = trail[i];
            var alpha = t.life * 0.4;
            var size = 6 + (1 - t.life) * 4;
            drawCrosshair(t.x, t.y, size, alpha);
          }

          requestAnimationFrame(drawTrail);
        }
        drawTrail();
      })();

      // ========== VIEW COUNTER ==========
      (function() {
        var el = document.getElementById('view-count');
        if (!el) return;

        // Simple view counter using CountAPI (free, no signup)
        var key = 'slothon-links-views';
        fetch('https://api.countapi.xyz/hit/bradleywilliamson.github.io/' + key)
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data && data.value) {
              el.textContent = '\uD83D\uDC41 ' + data.value.toLocaleString() + ' views';
            }
          })
          .catch(function() {
            // Silently fail - counter just won't show
          });
      })();
    </script>
